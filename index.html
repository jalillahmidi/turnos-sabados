<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turnos Sábados 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --border: #2e2c28;
    --accent: #e8c84a;
    --accent2: #c8a832;
    --text: #f0ece0;
    --text-muted: #7a7568;
    --text-dim: #4a4840;
    --jalil: #7eb8d4;
    --maria: #d4a07e;
    --elena: #9dd4a0;
    --manoli: #c49dd4;
    --radius: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  header {
    margin-bottom: 48px;
  }

  .eyebrow {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2.2rem, 6vw, 3.6rem);
    line-height: 1.05;
    color: var(--text);
    margin-bottom: 8px;
  }

  h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .subtitle {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  /* Worker selector */
  .worker-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 40px;
  }

  @media (min-width: 500px) {
    .worker-grid { grid-template-columns: repeat(4, 1fr); }
  }

  .worker-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .worker-btn::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--worker-color, var(--border));
    transition: opacity 0.15s;
    opacity: 0.5;
  }

  .worker-btn:hover::before,
  .worker-btn.active::before { opacity: 1; }

  .worker-btn:hover {
    border-color: var(--worker-color, var(--border));
    background: #222017;
  }

  .worker-btn.active {
    border-color: var(--worker-color, var(--accent));
    background: #222017;
  }

  .worker-initial {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--worker-color, var(--border));
    color: var(--bg);
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 8px;
    transition: transform 0.15s;
  }

  .worker-btn.active .worker-initial,
  .worker-btn:hover .worker-initial {
    transform: scale(1.08);
  }

  .worker-name {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .worker-btn.active .worker-name {
    color: var(--worker-color, var(--text));
  }

  /* Panel */
  #panel {
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.25s, transform 0.25s;
    display: none;
  }
  #panel.visible {
    display: block;
    opacity: 1;
    transform: translateY(0);
  }

  .panel-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .panel-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
  }

  .panel-count {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  /* Next shift highlight */
  .next-shift {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: relative;
    overflow: hidden;
  }

  .next-shift::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--active-color, var(--accent));
  }

  .next-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .next-date {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    color: var(--active-color, var(--accent));
  }

  .next-divider {
    width: 1px;
    height: 40px;
    background: var(--border);
  }

  .next-hours {
    font-size: 13px;
    color: var(--text);
    line-height: 1.7;
  }

  .next-days {
    margin-left: auto;
    text-align: right;
  }

  .days-num {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    color: var(--active-color, var(--accent));
    line-height: 1;
  }

  .days-label {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* Month sections */
  .months-wrapper {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .month-block {
    border-radius: var(--radius);
    overflow: hidden;
  }

  .month-label {
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 14px 16px 6px;
    background: var(--surface);
  }

  .shift-row {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    background: var(--surface);
    border-top: 1px solid var(--bg);
    gap: 16px;
    transition: background 0.1s;
  }

  .shift-row:hover { background: #201f1c; }

  .shift-row.past { opacity: 0.35; }

  .shift-row.today {
    background: #201f18;
    border-left: 2px solid var(--active-color, var(--accent));
  }

  .shift-date {
    font-size: 12px;
    color: var(--text-muted);
    min-width: 90px;
    letter-spacing: 0.03em;
  }

  .shift-weekday {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    min-width: 24px;
  }

  .shift-hours {
    font-size: 12px;
    color: var(--text);
    flex: 1;
  }

  .shift-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--active-color, var(--text-dim));
    opacity: 0.6;
    flex-shrink: 0;
  }

  .shift-row.past .shift-dot { background: var(--text-dim); }

  .shift-tag {
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 20px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .tag-next {
    background: var(--active-color, var(--accent));
    color: var(--bg);
  }

  .tag-past {
    border: 1px solid var(--border);
    color: var(--text-dim);
  }

  /* All workers view */
  #all-view { display: block; }

  .all-header {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 20px;
  }

  .all-row {
    display: grid;
    grid-template-columns: 100px 1fr 1fr 1fr 1fr;
    gap: 2px;
    margin-bottom: 2px;
  }

  .all-cell {
    background: var(--surface);
    padding: 10px 12px;
    font-size: 11px;
  }

  .all-cell.date-cell {
    color: var(--text-muted);
    border-radius: var(--radius) 0 0 var(--radius);
    display: flex; align-items: center;
    letter-spacing: 0.02em;
  }

  .all-cell.worker-cell {
    color: var(--text);
    font-size: 10px;
    line-height: 1.5;
  }

  .all-cell.worker-cell .wname {
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .all-cell:last-child { border-radius: 0 var(--radius) var(--radius) 0; }

  .all-row.past-row { opacity: 0.3; }
  .all-row.today-row .date-cell { color: var(--accent); }

  /* Tab nav */
  .tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 32px;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 4px;
    border: 1px solid var(--border);
    width: fit-content;
  }

  .tab {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.15s;
    border: none;
    background: transparent;
    font-family: 'DM Mono', monospace;
  }

  .tab:hover { color: var(--text); }
  .tab.active {
    background: var(--border);
    color: var(--text);
  }

  /* Responsive all-view */
  @media (max-width: 600px) {
    .all-row { grid-template-columns: 80px repeat(2, 1fr); }
    .all-row > .all-cell:nth-child(4),
    .all-row > .all-cell:nth-child(5) { display: none; }
    .all-row > .all-cell:nth-child(3) { border-radius: 0 var(--radius) var(--radius) 0; }
  }

  .footer-note {
    margin-top: 60px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="eyebrow">● Rotación activa — 2026</div>
    <h1>Turnos <em>Sábados</em></h1>
    <div class="subtitle">1 sábado cada 2 semanas &nbsp;·&nbsp; 4 trabajadores</div>
  </header>

  <!-- Worker selector -->
  <div class="worker-grid" id="workerGrid">
    <button class="worker-btn" data-worker="Jalil" style="--worker-color: var(--jalil)" onclick="selectWorker('Jalil')">
      <div class="worker-initial">J</div>
      <div class="worker-name">Jalil</div>
    </button>
    <button class="worker-btn" data-worker="María" style="--worker-color: var(--maria)" onclick="selectWorker('María')">
      <div class="worker-initial">M</div>
      <div class="worker-name">María</div>
    </button>
    <button class="worker-btn" data-worker="Elena" style="--worker-color: var(--elena)" onclick="selectWorker('Elena')">
      <div class="worker-initial">E</div>
      <div class="worker-name">Elena</div>
    </button>
    <button class="worker-btn" data-worker="Manoli" style="--worker-color: var(--manoli)" onclick="selectWorker('Manoli')">
      <div class="worker-initial">Ma</div>
      <div class="worker-name">Manoli</div>
    </button>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab" id="tab-individual" onclick="setTab('individual')">Mi turno</button>
    <button class="tab active" id="tab-all" onclick="setTab('all')">Todos</button>
  </div>

  <!-- Individual panel -->
  <div id="panel"></div>

  <!-- All workers panel -->
  <div id="all-view"></div>

  <div class="footer-note">Turnos Sábados 2026 &nbsp;·&nbsp; Actualizado abril 2026</div>
</div>

te": "25/04/2026", "shift": "09:30-14:30/16:30-22:00"}, {"date": "09/05/2026", "shift": "09:00-14:00/16:00-21:30"}, {"date": "23/05/2026", "shift": "09:00-15:30/18:00-22:00"}, {"date": "06/06/2026", "shift": "09:00-19:30"}, {"date": "20/06/2026", "shift": "09:30-14:30/16:30-22:00"}, {"date": "04/07/2026", "shift": "09:00-14:00/16:00-21:30"}, {"date": "01/08/2026", "shift": "09:00-19:30"}, {"date": "15/08/2026", "shift": "09:30-14:30/16:30-22:00"}, {"date": "29/08/2026", "shift": "09:00-14:00/16:00-21:30"}, {"date": "26/09/2026", "shift": "09:00-19:30"}, {"date": "10/10/2026", "shift": "09:30-14:30/16:30-22:00"}, {"date": "24/10/2026", "shift": "09:00-14:00/16:00-21:30"}, {"date": "07/11/2026", "shift": "09:00-15:30/18:00-22:00"}, {"date": "21/11/2026", "shift": "09:00-19:30"}, {"date": "05/12/2026", "shift": "09:30-14:30/16:30-22:00"}]};

const COLORS = { Jalil: '#7eb8d4', María: '#d4a07e', Elena: '#9dd4a0', Manoli: '#c49dd4' };
const MONTHS_ES = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
const MONTHS_FULL = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS_ES = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

let activeWorker = null;
let activeTab = 'all';

function parseDate(str) {
  const [d,m,y] = str.split('/');
  return new Date(+y, +m-1, +d);
}

function today() {
  const t = new Date();
  t.setHours(0,0,0,0);
  return t;
}

function daysDiff(d) {
  return Math.round((d - today()) / 86400000);
}

function formatShiftLines(shift) {
  return shift.split('/').join('<br>');
}

function selectWorker(name) {
  activeWorker = name;
  document.querySelectorAll('.worker-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-worker="${name}"]`).classList.add('active');
  if (activeTab === 'all') setTab('individual');
  else renderIndividual();
}

function setTab(tab) {
  activeTab = tab;
  document.getElementById('tab-individual').classList.toggle('active', tab === 'individual');
  document.getElementById('tab-all').classList.toggle('active', tab === 'all');
  document.getElementById('panel').style.display = tab === 'individual' ? 'block' : 'none';
  document.getElementById('all-view').style.display = tab === 'all' ? 'block' : 'none';
  if (tab === 'individual') renderIndividual();
  if (tab === 'all') renderAll();
}

function renderIndividual() {
  const panel = document.getElementById('panel');
  if (!activeWorker) {
    panel.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:20px 0;">Selecciona un trabajador arriba para ver sus turnos.</div>';
    panel.classList.add('visible');
    return;
  }
  const color = COLORS[activeWorker];
  const shifts = SHIFTS[activeWorker];
  const now = today();

  // Find next shift
  const next = shifts.find(s => parseDate(s.date) >= now);
  const past = shifts.filter(s => parseDate(s.date) < now);
  const future = shifts.filter(s => parseDate(s.date) >= now);

  let nextHtml = '';
  if (next) {
    const d = parseDate(next.date);
    const diff = daysDiff(d);
    const diffLabel = diff === 0 ? '¡HOY!' : diff === 7 ? 'en 7 días' : `en ${diff} días`;
    nextHtml = `
      <div class="next-shift" style="--active-color:${color}">
        <div>
          <div class="next-label">Próximo turno</div>
          <div class="next-date">${next.date.slice(0,5)}</div>
        </div>
        <div class="next-divider"></div>
        <div class="next-hours">${next.shift.replace('/', '<br>')}</div>
        <div class="next-days">
          <div class="days-num">${diff === 0 ? '!' : diff}</div>
          <div class="days-label">${diff === 0 ? 'hoy' : 'días'}</div>
        </div>
      </div>`;
  }

  // Group by month
  const byMonth = {};
  shifts.forEach(s => {
    const d = parseDate(s.date);
    const key = d.getFullYear() * 12 + d.getMonth();
    if (!byMonth[key]) byMonth[key] = { month: d.getMonth(), shifts: [] };
    byMonth[key].shifts.push(s);
  });

  let monthsHtml = '';
  Object.values(byMonth).forEach(({ month, shifts: ms }) => {
    let rowsHtml = ms.map(s => {
      const d = parseDate(s.date);
      const isPast = d < now;
      const isNext = next && s.date === next.date;
      const tag = isNext
        ? `<span class="shift-tag tag-next">próximo</span>`
        : isPast ? `<span class="shift-tag tag-past">pasado</span>` : '';
      return `
        <div class="shift-row ${isPast ? 'past' : ''} ${isNext ? 'today' : ''}" style="--active-color:${color}">
          <div class="shift-dot"></div>
          <div class="shift-date">${s.date.slice(0,5)}</div>
          <div class="shift-weekday">${DAYS_ES[d.getDay()]}</div>
          <div class="shift-hours">${s.shift}</div>
          ${tag}
        </div>`;
    }).join('');
    monthsHtml += `
      <div class="month-block">
        <div class="month-label">${MONTHS_FULL[month]}</div>
        ${rowsHtml}
      </div>`;
  });

  panel.innerHTML = `
    <div class="panel-header">
      <span class="panel-name" style="color:${color}">${activeWorker}</span>
      <span class="panel-count">${future.length} turno${future.length !== 1 ? 's' : ''} restante${future.length !== 1 ? 's' : ''}</span>
    </div>
    ${nextHtml}
    <div class="months-wrapper">${monthsHtml}</div>`;

  panel.classList.add('visible');
}

function renderAll() {
  const container = document.getElementById('all-view');
  const now = today();

  // Collect all unique dates
  const allDates = new Set();
  Object.values(SHIFTS).forEach(shifts => shifts.forEach(s => allDates.add(s.date)));
  const sorted = Array.from(allDates).sort((a,b) => parseDate(a)-parseDate(b));

  const workers = ['Jalil','María','Elena','Manoli'];

  const headerRow = `
    <div class="all-row" style="margin-bottom:8px">
      <div style="font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim);padding:4px 12px">Fecha</div>
      ${workers.map(w=>`<div style="font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:${COLORS[w]};padding:4px 12px">${w}</div>`).join('')}
    </div>`;

  let lastMonth = -1;
  let rowsHtml = '';

  sorted.forEach(dateStr => {
    const d = parseDate(dateStr);
    const isPast = d < now;
    const isToday = daysDiff(d) === 0;
    const month = d.getMonth();

    if (month !== lastMonth) {
      rowsHtml += `<div style="font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);padding:16px 12px 6px">${MONTHS_FULL[month].toUpperCase()}</div>`;
      lastMonth = month;
    }

    const cells = workers.map(w => {
      const entry = SHIFTS[w].find(s => s.date === dateStr);
      const shift = entry ? entry.shift : '—';
      const color = entry ? COLORS[w] : 'var(--text-dim)';
      return `<div class="all-cell worker-cell">
        <div class="wname" style="color:${color}">${w}</div>
        <div style="color:${entry ? 'var(--text)' : 'var(--text-dim)'}">${shift}</div>
      </div>`;
    }).join('');

    rowsHtml += `
      <div class="all-row ${isPast ? 'past-row' : ''} ${isToday ? 'today-row' : ''}">
        <div class="all-cell date-cell">${dateStr.slice(0,5)}<br><span style="font-size:9px;color:var(--text-dim)">${DAYS_ES[d.getDay()]}</span></div>
        ${cells}
      </div>`;
  });

  container.innerHTML = `<div class="all-header">Vista completa — todos los turnos</div>${headerRow}<div>${rowsHtml}</div>`;
}

// Init
renderAll();
</script>
</body>
</html>
